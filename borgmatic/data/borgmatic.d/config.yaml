btrfs:  

source_directories:  
    - /mnt/source/root   # root subvolume
    - /mnt/source/home   # home subvolume
patterns:
    - '- /home/*/.cache'
    - '- /var/log'
    - '- /var/cache'
    - '- /tmp'

repositories:  
    - path: /mnt/borg-repository

one_file_system: true
compression: lz4

archive_name_format: '{now:%Y%m%d_%H%M%S}-debian'

keep_within: 7d  
keep_daily: 1  
keep_weekly: 4  
keep_monthly: 6  
keep_yearly: 1
